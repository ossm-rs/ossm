name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  commits:
    name: Conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: webiny/action-conventional-commits@v1.3.0
        with:
          GITHUB_TOKEN: ${{ github.token }}

  build-esp:
    name: Build ${{ matrix.firmware }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        firmware: [ossm-alt, waveshare]
    steps:
      - uses: actions/checkout@v4

      - uses: esp-rs/xtensa-toolchain@v1.5

      - uses: Swatinem/rust-cache@v2

      - uses: extractions/setup-just@v2

      - name: Build ${{ matrix.firmware }}
        run: just build-${{ matrix.firmware }}

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: esp-rs/xtensa-toolchain@v1.5

      - name: Export ESP environment
        shell: pwsh
        run: |
          Get-Content "$env:USERPROFILE/exports" | ForEach-Object {
            if ($_ -match '\$Env:PATH\s*=\s*"([^"]+)"') {
              $path = $matches[1] -replace '\s*\+\s*\$Env:PATH', '' -replace '"', '' -replace ';$', ''
              $path >> $env:GITHUB_PATH
            }
            elseif ($_ -match '\$Env:(\w+)\s*=\s*"([^"]+)"') {
              $name = $matches[1]
              $value = $matches[2]
              "$name=$value" >> $env:GITHUB_ENV
            }
          }

      - uses: Swatinem/rust-cache@v2

      - uses: extractions/setup-just@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build all
        run: just build-all
