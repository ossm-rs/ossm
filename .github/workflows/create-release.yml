name: Create Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  tag:
    name: Bump version and create tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}

  build:
    name: Build ${{ matrix.firmware }}
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        firmware: [ossm-alt, waveshare]
    steps:
      - uses: actions/checkout@v4

      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          ldproxy: false
          cache: true

      - uses: Swatinem/rust-cache@v2

      - uses: extractions/setup-just@v2

      - name: Build ${{ matrix.firmware }}
        run: just build-${{ matrix.firmware }}

      - name: Install espflash
        run: |
          curl -L https://github.com/esp-rs/espflash/releases/download/v3.3.0/espflash-x86_64-unknown-linux-gnu.zip -o espflash.zip
          unzip espflash.zip
          chmod +x espflash
          sudo mv espflash /usr/local/bin/

      - name: Create firmware binary
        run: espflash save-image --chip esp32s3 target/xtensa-esp32s3-none-elf/release/${{ matrix.firmware }} ${{ matrix.firmware }}.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.firmware }}
          path: ${{ matrix.firmware }}.bin

  release:
    name: Create release
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        run: gh release create "$TAG" ossm-alt/ossm-alt.bin waveshare/waveshare.bin --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes "$NOTES"
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.tag.outputs.new_tag }}
          NOTES: ${{ needs.tag.outputs.changelog }}
