name: Create Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}

      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          ldproxy: false
          cache: true

      - uses: Swatinem/rust-cache@v2

      - uses: extractions/setup-just@v2

      - name: Build ossm-alt-m57aim
        run: just build-ossm-alt

      - name: Install espflash
        run: cargo install espflash@3.3.0

      - name: Create firmware binary
        run: espflash save-image --chip esp32s3 target/xtensa-esp32s3-none-elf/release/ossm-alt-m57aim ossm-alt-m57aim.bin

      - name: Create release
        run: gh release create "$TAG" ossm-alt-m57aim.bin --title "$TAG" --notes "$NOTES"
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.new_tag }}
          NOTES: ${{ steps.tag.outputs.changelog }}
